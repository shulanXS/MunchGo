spring:
  application:
    name: munchgo-backend
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:postgresql://localhost:5433/munchgo
    username: munchgo
    password: munchgo123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:munchgo-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long-for-hs512-algorithm}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}

---
# Docker 环境（backend 在 Docker 内，连接 munchgo-postgres 容器）
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://munchgo-postgres:5432/munchgo
    username: munchgo
    password: munchgo123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
